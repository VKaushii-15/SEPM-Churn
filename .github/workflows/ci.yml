# ============================================
# CI Pipeline — Churn Prediction Model
# ============================================
# Triggers on every push/PR to main.
# Trains the ML model and uploads artifacts.
# ============================================

name: CI – Train & Validate Churn Model

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  train-model:
    name: 🧠 Train ML Model
    runs-on: ubuntu-latest

    steps:
      # ── Step 1: Pull the code ──
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ── Step 2: Set up Python ──
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── Step 3: Cache pip packages (speeds up future runs) ──
      - name: 💾 Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ── Step 4: Install dependencies ──
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scipy scikit-learn \
                      xgboost lightgbm imbalanced-learn \
                      mlflow optuna joblib pyyaml

      # ── Step 5: Train the model ──
      - name: 🧠 Train model (with MLflow tracking)
        run: |
          python train_local.py

      # ── Step 6: Upload trained model as downloadable artifact ──
      - name: 📤 Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: churn-model
          path: artifacts/
          retention-days: 30

      # ── Step 7: Upload MLflow run logs ──
      - name: 📊 Upload MLflow logs
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-runs
          path: mlruns/
          retention-days: 14
