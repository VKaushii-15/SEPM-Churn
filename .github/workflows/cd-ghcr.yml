# ============================================
# CD Pipeline — GitHub Container Registry
# ============================================
# Automatically builds the Churn Predictor Dockerfile
# and publishes it as a live image to GHCR every time
# code is merged to the main branch.
# ============================================

name: CD – Deploy to GHCR

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  # Converts your username and repository into a valid docker image name
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    name: 🐳 Build & Publish Docker Container
    runs-on: ubuntu-latest
    
    # Required permissions to write to the GitHub Packages registry
    permissions:
      contents: read
      packages: write
      
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔑 Log in to the GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: 🚀 Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
